{% extends "smartcs/base.html" %}

{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <div class="auth-head">
            <h1 data-i18n="login.title">로그인</h1>
            <p data-i18n="login.subtitle">Smart CS 기능을 사용하려면 로그인하세요.</p>
        </div>

        <form class="auth-form">
            <div class="field-stack">
                <label for="login-email" data-i18n="login.email">이메일</label>
                <input id="login-email" type="email" placeholder="example@email.com" data-i18n-placeholder="login.email-placeholder">
            </div>

            <div class="field-stack">
                <label for="login-password" data-i18n="login.password">비밀번호</label>
                <input id="login-password" type="password" placeholder="비밀번호를 입력하세요" data-i18n-placeholder="login.password-placeholder">
            </div>

            <button type="button" class="primary-button auth-submit" data-i18n="login.submit">로그인</button>
        </form>

        <div class="auth-meta">
            <a href="{% url 'signup' %}" data-i18n="login.signup-link">계정이 없으신가요? 회원가입</a>
        </div>
    </div>
</section>
{% endblock %}
