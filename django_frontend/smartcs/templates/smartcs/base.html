{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart CS | {{ screen_title }}</title>
    <link rel="stylesheet" href="{% static 'smartcs/css/app.css' %}">
</head>
<body class="{% block body_class %}{% endblock %}">
    <div class="site-shell">
        <header class="topbar">
            <div class="topbar-inner">
                <div class="brand-group">
                    <a class="brand" href="{% url 'home' %}">
                        <img class="brand-logo" src="{% static 'smartcs/images/smart-cs-logo.svg' %}" alt="Smart CS 로고">
                    </a>
                    <div class="lang-toggle">
                        <button type="button" class="search-tool-button" data-language-toggle="ko">한국어</button>
                        <button type="button" class="search-tool-button" data-language-toggle="en">English</button>
                    </div>
                </div>
                <nav class="topnav">
                    <a href="{% url 'faq_browser' %}" class="{% if request.path == '/faq/' %}active{% endif %}" data-i18n="nav.faq">FAQ</a>
                    <a href="{% url 'service_centers' %}" class="{% if request.path == '/service-centers/' %}active{% endif %}" data-i18n="nav.service-centers">Service Centers</a>
                    <a href="{% url 'login' %}" class="{% if request.path == '/login/' %}active{% endif %}" data-i18n="nav.login">Login</a>
                    <a href="{% url 'signup' %}" class="{% if request.path == '/signup/' %}active{% endif %}" data-i18n="nav.signup">Sign Up</a>
                </nav>
            </div>
        </header>
        <main class="content content-wide">
            {% block content %}{% endblock %}
        </main>
    </div>
    <script src="{% static 'smartcs/js/app.js' %}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
