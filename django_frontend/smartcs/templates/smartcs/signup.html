{% extends "smartcs/base.html" %}

{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <div class="auth-head">
            <h1 data-i18n="signup.title">회원가입</h1>
            <p data-i18n="signup.subtitle">Smart CS 계정을 만들고 서비스를 이용하세요.</p>
        </div>

        <form class="auth-form">
            <div class="field-stack">
                <label for="signup-name" data-i18n="signup.name">이름</label>
                <input id="signup-name" type="text" placeholder="이름을 입력하세요" data-i18n-placeholder="signup.name-placeholder">
            </div>

            <div class="field-stack">
                <label for="signup-email" data-i18n="signup.email">이메일</label>
                <input id="signup-email" type="email" placeholder="example@email.com" data-i18n-placeholder="signup.email-placeholder">
            </div>

            <div class="field-stack">
                <label for="signup-password" data-i18n="signup.password">비밀번호</label>
                <input id="signup-password" type="password" placeholder="비밀번호를 입력하세요" data-i18n-placeholder="signup.password-placeholder">
            </div>

            <div class="field-stack">
                <label for="signup-password-confirm" data-i18n="signup.confirm">비밀번호 확인</label>
                <input id="signup-password-confirm" type="password" placeholder="비밀번호를 다시 입력하세요" data-i18n-placeholder="signup.confirm-placeholder">
            </div>

            <button type="button" class="primary-button auth-submit" data-i18n="signup.submit">회원가입</button>
        </form>

        <div class="auth-meta">
            <a href="{% url 'login' %}" data-i18n="signup.login-link">이미 계정이 있으신가요? 로그인</a>
        </div>
    </div>
</section>
{% endblock %}
