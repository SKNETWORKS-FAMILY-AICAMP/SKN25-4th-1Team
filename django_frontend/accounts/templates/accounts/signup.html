{% extends "smartcs/base.html" %}

{% block body_class %}auth-body{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-card">

        <h1 class="auth-title">회원가입</h1>

        <form method="post" class="auth-form">
            {% csrf_token %}

            <div class="auth-field">
                <label for="username">아이디</label>
                <input type="text" id="username" name="username" placeholder="아이디를 입력하세요" required>
            </div>

            <div class="auth-field">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
            </div>

            <div class="auth-field">
                <label for="password_confirm">비밀번호 확인</label>
                <input type="password" id="password_confirm" name="password_confirm" placeholder="비밀번호를 다시 입력하세요" required>
            </div>

            {% if error %}
                <p class="auth-error">{{ error }}</p>
            {% endif %}

            {% if success %}
                <p style="color:green; text-align:center; font-weight:700;">
                    {{ success }}
                </p>
            {% endif %}

            <button type="submit" class="auth-button">회원가입</button>
        </form>

        <p class="auth-link-text">
            이미 계정이 있으신가요?
            <a href="{% url 'accounts:login' %}">로그인</a>
        </p>

    </div>
</section>
{% endblock %}
