<!DOCTYPE html>
<html>
<head>
    <title>회원가입</title>
</head>
<body>

<h2>회원가입</h2>

<form method="post">
    {% csrf_token %}

    <div>
        <label>아이디</label><br>
        <input type="text" name="username" placeholder="아이디 입력">
    </div>

    <br>

    <div>
        <label>비밀번호</label><br>
        <input type="password" name="password" placeholder="비밀번호 입력">
    </div>

    <br>

    <div>
        <label>비밀번호 확인</label><br>
        <input type="password" name="password_confirm" placeholder="비밀번호 다시 입력">
    </div>

    <br>

    <button type="submit">회원가입</button>
</form>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<br>

<a href="/accounts/login/">로그인 하러가기</a>

</body>
</html>
