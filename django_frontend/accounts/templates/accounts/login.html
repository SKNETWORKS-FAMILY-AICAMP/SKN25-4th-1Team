<!DOCTYPE html>
<html>
<head>
    <title>로그인</title>
</head>
<body>

<h2>로그인</h2>

<form method="post">
    {% csrf_token %}
    
    <div>
        <label>아이디</label><br>
        <input type="text" name="username" placeholder="아이디 입력">
    </div>

    <br>

    <div>
        <label>비밀번호</label><br>
        <input type="password" name="password" placeholder="비밀번호 입력">
    </div>

    <br>

    <button type="submit">로그인</button>
</form>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<br>

<a href="/accounts/signup/">회원가입 하러가기</a>

</body>
</html>
