{% load static %}
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SKN25 고객 지원 챗봇</title>
  <link rel="stylesheet" href="{% static 'webui/styles.css' %}">
</head>
<body>
  <main class="shell">
    <section class="chat-panel" aria-label="고객 지원 챗봇">
      <header class="chat-header">
        <div>
          <p class="eyebrow">Samsung Galaxy Service</p>
          <h1>고객 지원 챗봇</h1>
        </div>
        <select id="deviceSelect" class="device-select" aria-label="기기 선택">
          <option value="선택하지 않음">기기 선택 안 함</option>
          <option value="Galaxy S24">Galaxy S24</option>
          <option value="Galaxy S23">Galaxy S23</option>
          <option value="Galaxy S22">Galaxy S22</option>
          <option value="Galaxy Z Fold">Galaxy Z Fold</option>
          <option value="Galaxy Z Flip">Galaxy Z Flip</option>
        </select>
      </header>

      <div id="chatLog" class="chat-log" aria-live="polite">
        <article class="message bot">
          <p>안녕하세요. 갤럭시 기기 문제나 서비스센터 안내가 필요하시면 편하게 말씀해 주세요.</p>
        </article>
      </div>

      <form id="chatForm" class="chat-form">
        <textarea id="messageInput" name="message" rows="2" placeholder="예: 화면 터치가 잘 안 돼요" required></textarea>
        <button id="sendButton" type="submit">전송</button>
      </form>
    </section>
  </main>
  <script src="{% static 'webui/app.js' %}"></script>
</body>
</html>
